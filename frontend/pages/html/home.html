<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"  type="text/css">
    <title>Home</title>
</head>
<style>
    :root {
        --primary: #2563eb;
        --success: #16a34a;
        --danger: #ef4444;
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
    .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

    /* Navbar */
    .navbar { background: white; border-bottom: 1px solid #e2e8f0; padding: 15px 0; position: sticky; top: 0; z-index: 100; }
    
    /* Ajuste base para a Nav e botões */
    .nav-content { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .nav-buttons { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    
    .nav-btn { 
        padding: 8px 16px; border-radius: 6px; border: 1px solid #e2e8f0; 
        background: white; cursor: pointer; font-weight: 500; transition: 0.2s;
    }
    .nav-btn:hover { background: #f1f5f9; }
    #logout { color: var(--danger); border-color: #fee2e2; }

    .hidden { display: none !important; }

    .info-panel {
        margin: 20px 0; padding: 20px; border-radius: 12px;
        box-shadow: var(--shadow); border-left: 5px solid var(--primary);
        background: white;
    }
    
    #orders-info { border-left-color: var(--success); background: #f0fdf4; }
    .panel-title { margin-top: 0; display: flex; align-items: center; gap: 10px; }

    .order-item {
        background: white; padding: 15px; margin-bottom: 10px;
        border-radius: 8px; border: 1px solid #dcfce7;
        display: flex; justify-content: space-between; align-items: center;
    }
    .order-item strong { color: #166534; }
    .order-date { font-size: 0.85rem; color: #64748b; }

    /* Grid de Produtos - Base 1 coluna */
    .grid-products { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
    .product-card { background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); }
    .btn-buy { width: 100%; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; margin-top: 15px; }

    /* Perfil - Base 1 coluna */
    .profile-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 25px; }

    .profile-field { display: flex; flex-direction: column; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
    .profile-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; font-weight: 700; margin-bottom: 4px; }
    .profile-value { font-size: 1rem; color: #1e293b; font-weight: 500; }
    .role-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; background: #e0e7ff; color: #4338ca; font-size: 0.8rem; }

    /* Footer Perfil - Base coluna */
    .profile-footer { display: flex; flex-direction: column; margin-top: 20px; padding-top: 15px; border-top: 2px dashed #f1f5f9; gap: 10px; }
    .date-group { font-size: 0.75rem; color: #94a3b8; }

    /* Order Card - Base coluna */
    .order-card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 15px;
        transition: transform 0.2s;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .order-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .order-details h4 { margin: 0 0 5px 0; color: var(--primary); }
    .order-details p { margin: 2px 0; font-size: 0.9rem; color: #475569; }
    .order-price { font-weight: bold; color: var(--success); font-size: 1.1rem; background: #f0fdf4; padding: 5px 10px; border-radius: 4px; align-self: flex-start; }
    .order-meta { font-size: 0.75rem; color: #94a3b8; margin-top: 8px; }

    /* --- SUAS REGRAS DE MEDIA QUERY ADICIONADAS ABAIXO --- */

    @media (min-width: 768px) {
        .nav-content { 
            flex-direction: row; 
            justify-content: space-between; 
        }
    }

    @media (min-width: 580px) {
        .grid-products { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 1024px) {
        .grid-products { grid-template-columns: repeat(3, 1fr); }
    }
    
    @media (min-width: 640px) {
        .order-card { 
            flex-direction: row; 
            justify-content: space-between; 
            align-items: center; 
        }
        .order-price { align-self: center; }
    }
    
    @media (min-width: 640px) {
        .profile-grid { grid-template-columns: repeat(2, 1fr); }
    }
    
    @media (min-width: 640px) {
        .profile-footer { 
            flex-direction: row; 
            justify-content: space-between; 
            align-items: center; 
        }
    }
</style>
<body>
<header class="navbar">
        <div class="container nav-content">
            <h1 style="color: var(--primary); margin:0;">Store<span> Brand</span></h1>
            <nav class="nav-buttons">
                <button id="you-balance" class="nav-btn"></button>
                <button id="profile" class="nav-btn">Profile</button>
                <button id="show-orders" class="nav-btn">You Orders</button>
                <button id="add-balance" class="nav-btn">Add Balance</button>
                <button id="open-verificador" class="nav-btn">Verificador</button>
                <button id="logout" class="nav-btn">Logout</button>
            </nav>
        </div>
    </header>

    <main class="container">
        <div id="profile-info" class="info-panel hidden"></div>

        <div id="orders-info" class="info-panel hidden">
            <h3 class="panel-title">You Orders</h3>
            <div id="orders-list">

            </div>
        </div>
        <div id="balance-info" class="info-panel hidden">

        </div>
        <h2 style="margin-top: 30px; text-align: center;">Products</h2>
        <div id="list-products" class="grid-products"></div>
    </main>
</body>
<script>

const BASE_API_ENDPOINT = ""

let access_token = window.localStorage.getItem("access_token");
let refresh_token = window.localStorage.getItem("refresh_token");
const logout = document.getElementById("logout");
const profile = document.getElementById("profile")
const userBalance = document.getElementById("you-balance")
const addBalanceBtn = document.getElementById("add-balance")
const updateUserBtn = document.getElementById("btn-user-update")
const btnOrders = document.getElementById("show-orders");
let currentUserId = "";
let currentUserName = "";
let currentUserLastname = ""
let currentUserEmail = ""
let isRefreshing = false;
let refreshPromise = null;
let refreshSubscribers = [];



// getBalanceInfo();
// getProducts();

document.getElementById("open-verificador").addEventListener('click', (e) => {
    e.preventDefault();

    window.location.href = "/ex/ws";
});

logout.addEventListener('click', (e) => {
    e.preventDefault(); 
    Logout();
})

addBalanceBtn.addEventListener('click', (e) => {
    e.preventDefault();

    const infoDiv = document.getElementById("balance-info");
    let selectedAmount = 0;

    infoDiv.classList.toggle("hidden");
    
    if (!infoDiv.classList.contains("hidden")) {
        infoDiv.innerHTML = `
        <h3 class="panel-title">Add Balance</h3>
        <form id="form-add-balance" style="display: flex; flex-direction: column; gap: 10px;">
            
            <div id="quick-select-container" style="display: flex; gap: 5px; margin-bottom: 5px;">
                ${[10, 20, 40, 60].map(val => 
                    `<button type="button" class="nav-btn quick-amount" data-value="${val}" 
                     style="flex: 1; padding: 10px; border: 1px solid #ccc; transition: 0.3s;">$${val}</button>`
                ).join('')}
            </div>

            <div style="display: flex; gap: 10px; margin-top: 10px; width: 100%;">
                <button type="submit" class="nav-btn" style="background: var(--success); color: white; flex: 1; padding: 10px 0;">Generate Payment</button>
                <button type="button" id="cancel-add-balance" class="nav-btn" style="flex: 1; padding: 10px 0;">Cancel</button>
            </div>
        </form>
        `;

        
        const quickBtns = infoDiv.querySelectorAll(".quick-amount");
        
        quickBtns.forEach(btn => {
            btn.onclick = () => {
                
                quickBtns.forEach(b => {
                    b.style.background = ""; 
                    b.style.color = "";
                    b.style.borderColor = "#ccc";
                });

                
                btn.style.background = "var(--success)";
                btn.style.color = "white";
                btn.style.borderColor = "var(--success)";

                
                selectedAmount = parseFloat(btn.getAttribute("data-value"));
            };
        });

        document.getElementById("cancel-add-balance").onclick = (e) => {
            e.preventDefault();
            infoDiv.innerHTML = ``;
            infoDiv.classList.add("hidden");
        };

        document.getElementById("form-add-balance").onsubmit = (ev) => {
            ev.preventDefault();
            
            if (selectedAmount <= 0) {
                alert("Please select an amount first!");
                return;
            }

            addBalance(selectedAmount, infoDiv);
        };
    }
});

profile.addEventListener('click', (e) => {
    e.preventDefault();
    const infoDiv = document.getElementById("profile-info");

    // Alterna a classe hidden
    infoDiv.classList.toggle("hidden");

    // Se a div foi mostrada (NÃO tem a classe hidden), chama a função Profile
    if (!infoDiv.classList.contains("hidden")) {
        infoDiv.innerHTML = "<p>Carregando perfil...</p>";
        Profile();
    }
});
        
btnOrders.addEventListener('click', (e) => {
    e.preventDefault();
    const ordersPanel = document.getElementById("orders-info");
    
    // Toggle de visibilidade
    ordersPanel.classList.toggle("hidden");
    // Se abrir, busca os dados
    if (!ordersPanel.classList.contains("hidden")) {
        document.getElementById('orders-list').innerHTML = "<p>Carregando seus pedidos...</p>";
        getOrdersProducts(currentUserId);
    }
});



function subscribeTokenRefresh(cb){
    refreshSubscribers.push(cb);
}

function onTokenRefreshed(){
    refreshSubscribers.forEach(cb => cb());
    refreshSubscribers = [];
}

function updateUserForm(e){
    if (e) e.preventDefault();

    const profInfo = document.getElementById("profile-info")

    profInfo.innerHTML = `
        <h3 class="panel-title">Update Profile</h3>
        <form id="form-update-user" style="display: flex; flex-direction: column; gap: 10px;">
            <label>Name:
                <input type="text" id="update-name" value="${currentUserName}" class="nav-btn" style="width: 100%">
            </label>
            <label>Lastname:
                <input type="text" id="update-lastname" value="${currentUserLastname}" class="nav-btn" style="width: 100%">
            </label>
            <label>Email:
                <input type="text" id="update-email" value="${currentUserEmail}" class="nav-btn" style="width: 100%">
            </label>
            <label>Password:
                <input type="text" id="update-password" value="" class="nav-btn" style="width: 100%">
            </label>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button type="submit" id="btn-update-profile-submit" class="nav-btn" style="background: var(--success); color: white;">Save Changes</button>
                <button type="button" id="cancel-update" class="nav-btn">Cancel</button>
            </div>
        </form>
    `
    document.getElementById("cancel-update").onclick =()=> Profile();
    document.getElementById("form-update-user").onsubmit = (ev) => {
        ev.preventDefault();
        if(!confirm("tem certeza que deseja atualizar as informacoes do usuario?")) return;

        const btnSubmit = document.getElementById("btn-update-profile-submit")

        if(btnSubmit){
            btnSubmit.disabled = true;
            btnSubmit.innerText = `updating...`
        }

        const name = document.getElementById("update-name").value
        const lastname = document.getElementById("update-lastname").value
        const email = document.getElementById("update-email").value
        const password = document.getElementById("update-password").value

        const data = {
            user_id:currentUserId,
            name:name,
            lastname:lastname,
            email:email,
            password:password,
        }

        if (password.length > 0 && password.length < 6) {
            alert("password caracters invalid")
            return;
        } 

        updateUser(data);

        btnSubmit.innerText = `Save Changes`
        btnSubmit.disabled = false;

        Profile();

    }
}

const getAuthHeaders = () => {
    const at = window.localStorage.getItem("access_token");
    const rt = window.localStorage.getItem("refresh_token");
    return {
        'Content-Type': 'application/json',
        'access-token': `bearer ${at}`,
        'refresh-token': `bearer ${rt}`
    };
};

/**
 * 1. SISTEMA DE REFRESH DE TOKEN
 * Gerencia a renovação automática para evitar deslogar o usuário
 */
async function rf() {
    if (isRefreshing) return refreshPromise;

    isRefreshing = true;
    refreshPromise = (async () => {
        try {
            const response = await fetch(`/api/refresh`, {
                method: "GET",
                headers: getAuthHeaders()
            });

            if (response.status === 401 || response.status === 403) {
                window.location.assign("/unauthorized");
                return false;
            }

            const data = await response.json();
            if (data?.tokens) {
                window.localStorage.setItem("access_token", data.tokens.access_token);
                window.localStorage.setItem("refresh_token", data.tokens.refresh_token);
                return true;
            }
            return false;
        } catch (error) {
            console.error("Erro na renovação de token:", error);
            return false;
        } finally {
            isRefreshing = false;
            refreshPromise = null;
        }
    })();
    return refreshPromise;
}

/**
 * 2. FUNÇÕES DE USUÁRIO E PERFIL
 */

async function getBalanceInfo() {
    try {
        const response = await fetch("/api/user/find", {
            method: "GET",
            headers: getAuthHeaders()
        });

        if (response.status === 401) {
            if (await rf()) return await getBalanceInfo();
            return;
        }

        const data = await response.json();
        if (data?.user) {
            currentUserId = data.user.user_id;
            const balanceEl = document.getElementById("userBalance");
            if (balanceEl) balanceEl.innerHTML = `Balance: R$ ${data.user.balance.toFixed(2)}`;
        }
    } catch (error) {
        console.error("Erro ao buscar saldo:", error);
    }
}

async function Profile() {
    try {
        const response = await fetch("/api/user/find", {
            method: "GET",
            headers: getAuthHeaders()
        });

        if (response.status === 401) {
            if (await rf()) return await Profile();
            return;
        }

        const data = await response.json();
        const divProfile = document.getElementById('profile-info');

        currentUserId = data.user.user_id;
        currentUserName = data.user.name;
        currentUserLastname = data.user.lastname;
        currentUserEmail = data.user.email;

        divProfile.innerHTML = `
            <h3 class="panel-title">User Profile</h3>
            <div class="profile-grid">
                <div class="profile-field"><span class="profile-label">Full Name</span><span class="profile-value">${data.user.name} ${data.user.lastname}</span></div>
                <div class="profile-field"><span class="profile-label">Email</span><span class="profile-value">${data.user.email}</span></div>
                <div class="profile-field"><span class="profile-label">Balance</span><span class="profile-value" style="color: var(--success)">R$ ${data.user.balance.toFixed(2)}</span></div>
            </div>
            <div class="profile-footer">
                <button id="btn-user-update" class="nav-btn" style="background: var(--primary); color: white;">Edit Profile</button>
            </div>
        `;
        document.getElementById("btn-user-update").onclick = updateUserForm;
    } catch (error) {
        console.error("Erro ao carregar perfil:", error);
    }
}

async function updateUser(data) {
    try {
        const response = await fetch("/api/user/update", {
            method: 'PUT',
            headers: getAuthHeaders(),
            body: JSON.stringify(data)
        });

        if (response.status === 401) {
            if (await rf()) return await updateUser(data);
            return;
        }

        const result = await response.json();
        if (result.error) {
            alert(result.message);
        } else {
            alert("Usuário atualizado com sucesso!");
            await Profile();
        }
    } catch (error) {
        console.error("Erro ao atualizar usuário:", error);
    }
}

/**
 * 3. FUNÇÕES DE PRODUTOS E PEDIDOS
 */

async function getProducts() {
    try {
        const response = await fetch('/api/product/findall', { 
            method: 'GET',
            headers: { 'Content-Type': 'application/json' }
        });

        if (response.status === 401) {
            if (await rf()) return await getProducts();
            return;
        }

        const data = await response.json();
        const container = document.getElementById('list-products');
        container.innerHTML = '';

        if (!data || data.length === 0) return;

        data.forEach(product => {
            container.innerHTML += `
                <div class="card">
                    <p class="name">${product.name}</p>
                    <p class="description">Description: ${product.description}</p>
                    <p class="price">R$ ${product.price.toFixed(2)}</p>
                    <button class="btn-buy" data-id="${product.product_id}" data-name="${product.name}">Buy Product</button>
                </div>`;
        });
    } catch (error) {
        console.error("Erro ao listar produtos:", error);
    }
}

async function createOrder(productId, productName, btn) {
    try {
        const body = { account_id: currentUserId, products_ids: [productId] };
        const response = await fetch("/api/orders", {
            method: "POST",
            headers: getAuthHeaders(),
            body: JSON.stringify(body)
        });

        if (response.status === 401) {
            if (await rf()) return await createOrder(productId, productName, btn);
            return;
        }

        const data = await response.json();
        if (data.error) {
            alert(data.message);
        } else {
            alert(`Sucesso: ${productName} adquirido!`);
            await getBalanceInfo();
            await getProducts();
        }
    } catch (error) {
        console.error("Erro no pedido:", error);
    } finally {
        if (btn) {
            btn.disabled = false;
            btn.innerText = "Buy Product";
        }
    }
}

async function getOrdersProducts() {
    try {
        const response = await fetch("/api/orders/find/account", {
            method: "GET",
            headers: getAuthHeaders()
        });

        if (response.status === 401) {
            if (await rf()) return await getOrdersProducts();
            return;
        }

        const data = await response.json();
        const list = document.getElementById('orders-list');
        list.innerHTML = '';

        if (!data || data.length === 0) {
            list.innerHTML = "<p>Nenhum pedido encontrado.</p>";
            return;
        }

        for (const order of data) {
            await getProductByIdForOrder(order.products_ids[0], order.created_at);
        }
    } catch (error) {
        console.error("Erro ao listar pedidos:", error);
    }
}

async function getProductByIdForOrder(productId, orderDate) {
    try {
        const response = await fetch(`/api/product/find/${productId}`, {
            method: "GET",
            headers: getAuthHeaders()
        });

        if (response.status === 401) {
            if (await rf()) return await getProductByIdForOrder(productId, orderDate);
            return;
        }

        const data = await response.json();
        const list = document.getElementById('orders-list');
        list.innerHTML += `
            <div class="order-card">
                <h4>${data.name}</h4>
                <p>Data: ${new Date(orderDate).toLocaleString('pt-BR')}</p>
                <strong>R$ ${data.price.toFixed(2)}</strong>
            </div>`;
    } catch (error) {
        console.error("Erro ao buscar detalhes do produto do pedido:", error);
    }
}

/**
 * 4. PAGAMENTOS E DEPÓSITO
 */

async function addBalance(amount, infoDiv) {
    try {
        const response = await fetch("/api/payments/pix", {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify({ method: "pix", amount, account_id: currentUserId })
        });

        if (response.status === 401) {
            if (await rf()) return await addBalance(amount, infoDiv);
            return;
        }

        const data = await response.json();
        if (data.error) throw new Error(data.error);

        const pixPayload = "00020101021126580014br.gov.bcb.pix..."; // Exemplo retornado pela sua API
        const qrCodeUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(pixPayload)}`;

        infoDiv.innerHTML = `
            <div style="text-align:center;">
                <h3>Pagar R$ ${amount}</h3>
                <img src="${qrCodeUrl}" style="margin:10px;">
                <input type="text" id="pix-raw" value="${pixPayload}" readonly style="width:100%">
                <button id="btn-copy" class="nav-btn">Copiar</button>
                <button id="btn-close-pix" class="nav-btn">Fechar</button>
            </div>`;

        document.getElementById("btn-copy").onclick = () => {
            const input = document.getElementById("pix-raw");
            input.select();
            navigator.clipboard.writeText(input.value);
            alert("Copiado!");
        };

        document.getElementById("btn-close-pix").onclick = () => {
            infoDiv.classList.add("hidden");
        };

    } catch (error) {
        console.error("Erro ao gerar PIX:", error);
        infoDiv.innerHTML = `<p style="color:red">Erro ao processar pagamento.</p>`;
    }
}

/**
 * 5. SAÍDA E EVENTOS
 */

async function Logout() {
    try {
        await fetch("/api/logout", {
            method: "GET",
            headers: getAuthHeaders()
        });
    } catch (e) {
        console.warn("Logout no servidor falhou, limpando localmente.");
    } finally {
        window.localStorage.clear();
        window.location.assign("/login");
    }
}

// Inicialização
window.onload = async () => {
    await getBalanceInfo();
    await getProducts();
};

</script>
</html>
