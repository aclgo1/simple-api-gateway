version: '3.9'

services:

  simple-api-gateway:
    build: .
    restart: always
    deploy:
      resources:
        limits:
          memory: 180M
    # expose:
    # - "4000:4000"
    # - "50051:50051"
    # - "50052:50052"
    # - "50053:50053"
    # - "50054:50054"
    # - "50055:50055"
    # - "27017:27017"
    # - "5432:5432"
    depends_on:
      - grpc-mail
      - redis
      - mongodb
      - db
      - grpc-admin
      - grpc-user
      - grpc-orders
      - grpc-product
      - grpc-balance
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  grpc-user:
    build: ../grpc-jwt-login
    container_name: grpc-jwt-login
    restart: always
    deploy:
      resources:
        limits:
          memory: 80M
    expose:
      - "50052:50052"
    depends_on:
      - grpc-admin
      - db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  grpc-admin:
    build: ../grpc-admin
    container_name: grpc-admin
    restart: always
    deploy:
      resources:
        limits:
          memory: 80M
    expose:
      - "50051:50051"
    depends_on:
      - db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grpc-mail:
    build: ../grpc-mail
    container_name: grpc-mail
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M
    expose:
      - 50053:50053
      - 3003:3003
    depends_on:
      - grpc-user
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  
  grpc-product:
    build: ../grpc-product
    container_name: grpc-product
    restart: always
    deploy:
      resources:
        limits:
          memory: 80M
    expose:
      - 50054:50054
    depends_on:
      - grpc-user
      - grpc-admin
      - grpc-mail
      - db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  grpc-orders:
    build: ../grpc-orders
    container_name: grpc-orders
    restart: always
    deploy:
      resources:
        limits:
          memory: 80M
    expose: 
      - 50055:50055
    depends_on:
      - grpc-user
      - grpc-admin
      - grpc-mail
      - db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  grpc-balance:
    build: ../grpc-balance
    container_name: grpc-balance
    restart: always
    deploy:
      resources:
        limits:
          memory: 80M
    expose: 
      - 50056:50056
    depends_on:
      - grpc-user
      - grpc-admin
      - grpc-mail
      - mongodb
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  concurrency-example:
    build: ../concurrency-example
    container_name: concurrency-example
    restart: always
    deploy:
      resources:
        limits:
          memory: 100M
    expose:
      - 3000:3000
    depends_on:
      - simple-api-gateway
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  
  mongodb:
    image: mongo:4.4
    container_name: mongodb
    restart: always
    command: mongod --wiredTigerCacheSizeGB 0.25
    deploy:
      resources:
        limits:
          memory: 400M
    expose:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=wallets
      - MONGO_INITDB_ROOT_PASSWORD=wallets
    volumes:
      - ../simple-api-gateway-data/mongo:/data/db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  redis:
    image: redis
    container_name: redis
    restart: always
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          memory: 100M
    expose:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=1234
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:15.2-alpine3.17
    container_name: db
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    environment:
      POSTGRES_PASSWORD: api-gateway
      POSTGRES_USER: api-gateway
      POSTGRES_DB: api-gateway

    expose:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U api-gateway"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ../simple-api-gateway-data/postgres:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    deploy:
      resources:
        limits:
          memory: 32M
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - simple-api-gateway
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"