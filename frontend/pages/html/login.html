<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css"/>
    <title>Store Login</title>
</head>
<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: url("https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/eac2616f-9ca4-4a89-84d5-7bbc482fb1b2/df2dmoo-3403837f-2435-4c6b-9bd6-b82891aabe2d.jpg?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7InBhdGgiOiJcL2ZcL2VhYzI2MTZmLTljYTQtNGE4OS04NGQ1LTdiYmM0ODJmYjFiMlwvZGYyZG1vby0zNDAzODM3Zi0yNDM1LTRjNmItOWJkNi1iODI4OTFhYWJlMmQuanBnIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmZpbGUuZG93bmxvYWQiXX0.Rn4fVOkXvtPjkkBt7uBdxdZlFvRpqVNg3TBuhnr5R_E");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .main {
            width: 320px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        #chk_login, #chk_signup { display: none; }
        .login-form, .signup-form { display: none; }
        .initial-btns { display: flex; flex-direction: column; }

        #chk_login:checked ~ .login-form { display: block; }
        #chk_login:checked ~ .initial-btns { display: none; }
        #chk_signup:checked ~ .signup-form { display: block; }
        #chk_signup:checked ~ .initial-btns { display: none; }

        /* Padronização de Input e Botões */
        input, button, .btn-label {
            width: 100%;
            height: 40px;
            padding: 10px;
            margin: 8px 0;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 0.9rem;
            display: block;
        }

        button, .btn-label {
            background: #362982;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            line-height: 20px;
            border: none;
        }

        .btn-secondary {
            background: #6c757d;
            font-size: 0.8rem;
            margin-top: 15px;
        }

        /* --- CAPTCHA --- */
        .captcha-container {
            text-align: center;
            margin: 10px 0;
        }

        #image-captcha-login, #image-captcha-signup {
            height: 70px; 
            width: 200px;
            display: block;
            margin: 0 auto 8px auto;
            border: 1px solid #bbb;
            background: #eee;
        }

        #awnser-captcha-login, #awnser-captcha-signup {
            width: 200px;
            margin: 0 auto;
        }

        #image-captcha-login, #image-captcha-signup {
            transform: translateZ(0);
            will-change: transform;
        }
        /* --- ESTILO ALTERADO: FORGOT PASS --- */
        #forgot {
            display: block;
            text-align: center;
            font-size: 1rem;       /* Maior (era 0.8rem) */
            color: #ffffff;        /* Branco */
            text-decoration: none;
            margin-top: 10px;
            font-weight: bold;     /* Mais destaque */
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5); /* Sombra para ler melhor no fundo branco/claro */
        }

        #forgot:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="main">
        <input type="checkbox" id="chk_login">
        <input type="checkbox" id="chk_signup">

        <div class="initial-btns">
            <label for="chk_login" class="btn-label">LOGIN</label>
            <label for="chk_signup" class="btn-label" style="background:#444">SIGN UP</label>
        </div>

        <div class="signup-form">
            <form>
                <input type="text" id="user" placeholder="Name"/>
                <input type="text" id="lastname" placeholder="Lastname">
                <input type="email" id="email" placeholder="Email"/>
                <input type="password" id="pass" placeholder="Password"/>
                
                <div class="captcha-container">
                    <img id="image-captcha-signup" alt="Captcha">
                    <input type="text" id="awnser-captcha-signup" placeholder="Code">
                </div>
                
                <button type="submit" id="createBtn">Sign Up</button>
                <label for="chk_login" class="btn-label btn-secondary" onclick="document.getElementById('chk_signup').checked = false">Back to Login</label>
            </form>
        </div>

        <div class="login-form">
            <form>
                <input type="text" id="user_login" placeholder="Email or Username"/>
                <input type="password" id="pass_login" placeholder="Password"/>

                <div class="captcha-container">
                    <img id="image-captcha-login" alt="Captcha">
                    <input type="text" id="awnser-captcha-login" placeholder="Code">
                </div>

                <button type="submit" id="loginBtn">Login</button>
                <a id="forgot" href="/resetpass">Forgot Pass?</a>
                <label for="chk_signup" class="btn-label btn-secondary" onclick="document.getElementById('chk_login').checked = false">Create Account</label>
            </form>
        </div>
    </div>

    <h1 id="message"></h1>

</body>
</html>
<script>

getCaptcha();
const BASE_URL = "http://localhost:4000";
const createBtn = document.getElementById('createBtn');
const loginBtn = document.getElementById('loginBtn');
let idCaptcha = ""
let inputCaptchaSignup = document.getElementById("awnser-captcha-signup");
let inputCaptchaLogin = document.getElementById("awnser-captcha-login")

createBtn.addEventListener("click", (event)=> {
    event.preventDefault();
    Create();
});

loginBtn.addEventListener("click",(event)=>{
    event.preventDefault();
    Login();
});

function checkEmpty(data) {
    if (!data) {
        window.alert(`${data} empty`)
    }
}

function Create(){
    const us = document.getElementById('user').value;
    const lastname = document.getElementById('lastname').value;
    const ps = document.getElementById('pass').value;
    const em = document.getElementById('email').value;
    const message = document.getElementById('message');

    if (!us) {
        window.alert(`name empty`)
        return;
    }
    if (!lastname) {
        window.alert(`lastname empty`)
        return
    }
    if (!em) {
        window.alert(`email empty`)
        return
    }
    if (!ps) {
        window.alert(`password empty`)
        return
    }

    if(inputCaptchaSignup.value== ""){
        window.alert("empty captcha code")
        return;
    }
        
    const data = {
        name:us,
        lastname: lastname,
        password: ps,
        email: em,
        captcha_id: idCaptcha,
        captcha_awnser: inputCaptchaSignup.value,
    };

    console.log(data);

    createBtn.disabled =  true;
    createBtn.innerHTML = "wait..."

    const options = {
        method:"POST",
        body: JSON.stringify(data),
        headers: {
            "Content-Type":"application/json"
        }
    };

    fetch("/api/user/register", options)
    .then(response => response.text())
    .then(resp =>{
        const r = JSON.parse(resp);
        if ("error" in r){
            console.log(r.message);
            window.alert(r.message);
             //   message.textContent = r.error;
            getCaptcha();
            return;
        }

        window.localStorage.setItem('access_token', r.created.tokens.access_token);
        window.localStorage.setItem('refresh_token', r.created.tokens.refresh_token);
        
        let planAmount = localStorage.getItem('selected-plan')

        if(planAmount !== null && planAmount.trim() !== "" && !isNaN(planAmount)){
            window.location.href = "/pricing/pix"
            return;   
        }

        window.alert(r.message)
        window.location.assign("/home")
    })

    .catch(error =>{
        console.error(error);
    })
    .finally(()=>{
        createBtn.disabled = false;
        createBtn.innerHTML = `Sign up`
    });
};

function Login(){

    const us = document.getElementById('user_login').value;
    const ps = document.getElementById('pass_login').value;
    if(inputCaptchaLogin.value == ""){
        window.alert("empty captcha code")
        return;
    }

    if (!us || !ps) {
        console.log("empty crendentials")
        window.alert("empty crendentials")
        return;
    }

    const data = {
        email: us,
        password:ps,
        captcha_id: idCaptcha,
        captcha_awnser: inputCaptchaLogin.value,
    }

    loginBtn.disabled =  true;
    loginBtn.innerHTML = "wait..."

    const options = {
        method: "POST",
        body: JSON.stringify(data),
        headers: {
            "Content-Type":"application/json",
        }
    };

    fetch("/api/login", options)
    .then(response => {
        if (response.status == 403){
            window.location.assign(BASE_URL + "api/confirm");
            return;
        }

        return response.json();
    })
    .then(r =>{
            
        if ("error" in r){
            console.log(r.message);
            window.alert(r.message);
            getCaptcha();
            return;
        } 

        console.log("access-token: ", r.tokens.access_token);
        console.log("refresh-token: ", r.tokens.refresh_token);
        window.alert("user logged")

        window.localStorage.setItem('access_token', r.tokens.access_token);
        window.localStorage.setItem('refresh_token', r.tokens.refresh_token);

        const headers = {
            'access-token' : `Baerer ${r.tokens.access_token}`
        }

        let planAmount = localStorage.getItem('selected-plan')

        if(planAmount !== null && planAmount.trim() !== "" && !isNaN(planAmount)){
            window.location.href = "/pricing/pix"
            return;   
        }

        window.location.href = "/home" ;

        })

        .catch(error =>{
            console.error(error);
    })
    .finally(()=>{
        loginBtn.disabled =  false;
        loginBtn.innerHTML = `Login`
    })
};

function getCaptcha(){
    opt = {
        method:'GET',
        headers: {
            'Content-Type':'application/json',
        }
    }

    fetch(`/api/captcha`, opt)
    .then(response => {
        return response.json()
    })
    .then(data =>{
        const imageCaptchaLogin = document.getElementById("image-captcha-login")
        const imageCaptchaSignup = document.getElementById("image-captcha-signup")

        imageCaptchaLogin.src = ""
        imageCaptchaSignup.src = ""

        const imgData = data.base64_image; // Sua string base64
            
        // Criamos um objeto de imagem temporário para forçar o decode
        let tempImg = new Image();
        tempImg.src = imgData;
        tempImg.decode().then(() => {
            imgLogin.src = imgData;
            imgSignup.src = imgData;
        }).catch(() => {
            // Fallback caso o decode falhe
            imgLogin.src = imgData;
            imgSignup.src = imgData;
        });

        idCaptcha = data.id;
        inputCaptchaSignup.value = "";
        inputCaptchaLogin.value = ""
        
        console.log(idCaptcha);
    })
    .catch(error=>{
        console.log(`error in connection ${error.message}`)
    })
}

</script>
</html>
