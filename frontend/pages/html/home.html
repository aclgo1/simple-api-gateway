<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Home</title>

<style>
        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

        /* Navbar */
        .navbar { background: white; border-bottom: 1px solid #e2e8f0; padding: 15px 0; position: sticky; top: 0; z-index: 100; }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .nav-buttons { display: flex; gap: 10px; }
        
        .nav-btn { 
            padding: 8px 16px; border-radius: 6px; border: 1px solid #e2e8f0; 
            background: white; cursor: pointer; font-weight: 500; transition: 0.2s;
        }
        .nav-btn:hover { background: #f1f5f9; }
        #logout { color: var(--danger); border-color: #fee2e2; }

        /* Classes Utilitárias */
        .hidden { display: none !important; }

        /* Seções de Informação (Perfil e Pedidos) */
        .info-panel {
            margin: 20px 0; padding: 20px; border-radius: 12px;
            box-shadow: var(--shadow); border-left: 5px solid var(--primary);
            background: white;
        }
        
        #orders-info { border-left-color: var(--success); background: #f0fdf4; }
        .panel-title { margin-top: 0; display: flex; align-items: center; gap: 10px; }

        /* Itens da Lista de Pedidos */
        .order-item {
            background: white; padding: 15px; margin-bottom: 10px;
            border-radius: 8px; border: 1px solid #dcfce7;
            display: flex; justify-content: space-between; align-items: center;
        }
        .order-item strong { color: #166534; }
        .order-date { font-size: 0.85rem; color: #64748b; }

        /* Grid de Produtos Principal */
        .grid-products { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); }
        .btn-buy { width: 100%; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; margin-top: 15px; }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        /* Blocos Individuais de Informação */
        .profile-field {
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 10px;
        }

        .profile-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-value {
            font-size: 1rem;
            color: #1e293b;
            font-weight: 500;
        }

        /* Badge de Status/Role */
        .role-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            background: #e0e7ff;
            color: #4338ca;
            font-size: 0.8rem;
        }

        /* Rodapé do Perfil (Datas e Botão) */
        .profile-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed #f1f5f9;
        }

        .date-group {
            font-size: 0.75rem;
            color: #94a3b8;
        }

    .order-card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 15px;
        transition: transform 0.2s;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .order-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow);
    }

    .order-details h4 {
        margin: 0 0 5px 0;
        color: var(--primary);
    }

    .order-details p {
        margin: 2px 0;
        font-size: 0.9rem;
        color: #475569;
    }

    .order-price {
        font-weight: bold;
        color: var(--success);
        font-size: 1.1rem;
        background: #f0fdf4;
        padding: 5px 10px;
        border-radius: 4px;
    }

    .order-meta {
        font-size: 0.75rem;
        color: #94a3b8;
        margin-top: 8px;
    }

    </style>

function subscribeTokenRefresh(cb){
    refreshSubscribers.push(cb);
}

function onTokenRefreshed(){
    refreshSubscribers.forEach(cb => cb());
    refreshSubscribers = [];
}

        if(btnSubmit){

        const email = document.getElementById("update-email").value

            lastname:lastname,
            email:email,

        }

        if (password.length > 0 && password.length < 6) {
            alert("password caracters invalid")
            return;
        } 

        updateUser(data);

        btnSubmit.innerText = `Save Changes`
        btnSubmit.disabled = false;

        Profile();

    }
}

function refreshTokens(fn){
    
    if(isRefreshing){
        return new Promise(resolve =>{
            subscribeTokenRefresh(()=>{
                resolve(fn());
            })
        })
    }

    isRefreshing = true;

    const opt = {
        method: "GET",
        headers: {
            'Content-Type':'application/json',
            'access-token' :`bearer ${access_token}`,
            'refresh-token': `bearer ${refresh_token}`
        }
    }

    fetch("/api/refresh", opt)
    .then(response => {
        if(!response.ok){
            console.log("unauthorized")
            window.location.assign("/unauthorized")
            return;
        }

        return response.json()
    })

    .then(data =>{
        access_token = data.tokens.access_token;
        refresh_token = data.tokens.refresh_token;

        // localStorage.clear();

        window.localStorage.setItem("access_token", access_token)
        window.localStorage.setItem("refresh_token", refresh_token)

        console.log("tokens access and refresh new")
        onTokenRefreshed();
        return fn()
    })
    .catch(error =>{
        console.error("error in refresh:", error)
        window.location.assign("/unauthorized")
    })
    .finally(
        isRefreshing = false
    )  
}

    fetch("/api/logout", opt)

            return;
        }
        return response.json();
    })

    .then(r => {
        const divProfile = document.getElementById('profile');
        divProfile.innerHTML = ``

        console.log(r.message)
        access_token = "";
        refresh_token = "";

        // const log = document.getElementById('logout');
        window.location.assign("/login")  
    });
}

function getOrdersProducts(accountId){

        method: "GET",
        headers: {
            'Content-Type':'application/json',
            'access-token' :`bearer ${access_token}`,
        }
    }

    fetch("/api/orders/find/account", opt)
    .then(response =>{
        if(response.status == 401){
            return refreshTokens(()=>getOrdersProducts(accountId) );
        }
 
        return response.json()
    })
    .then(data =>{
        if(data == null) {
            console.log("client 0 orders")
            document.getElementById('orders-list').innerHTML = "<p>client 0 orders</p>";
            return;
        }
        console.log("orders searched")
        document.getElementById('orders-list').innerHTML = ``
        data.forEach(order =>{
            getProductById(order.products_ids[0], order.created_at)
        })
    })
}

function getProductById(productId, orderCreatedAt){
    opt = {
        method: "GET",
        headers: {
            'Content-Type':'application/json',
            'access-token' :`bearer ${access_token}`,
        }
    }

    fetch("/api/product/find/"+ productId, opt)
    .then(response =>{
        if(response.status == 401){
           return refreshTokens(() => getProductById(productId, orderCreatedAt));
        }
        return response.json();
    })
    .then(data =>{
        const ordersList = document.getElementById('orders-list')
        ordersList.innerHTML += ordersList.innerHTML = `
            <div class="order-card" id="order-${data.product_id}">
                <div class="order-details">
                    <h4>${data.name}</h4>
                    <p>${data.description}</p>
                    <div class="order-meta">
                        Buyed in: ${new Date(orderCreatedAt).toLocaleString('pt-BR')}
                    </div>
                </div>
                <div class="order-price">
                    R$ ${data.price.toFixed(2)}
                </div>
            </div>
        `;
        // console.log(`product ${JSON.stringify(data)} buyed at ${orderCreatedAt}`)
    })
}

            'access-token': `Bearer ${access_token}`,
        },
        body: JSON.stringify(data),
    }

    fetch("/api/user/update", opt)
    .then(response =>{
        if (response.status == 401){
            return refreshTokens(()=>updateUser(data))
        }

        return response.json()
    })
    .then(data =>{
        if (data.error){
            alert(data.message)
            return;
        }

        alert("user updated succes")
        console.log(data)
        Profile();
    })
    .catch(error =>{
        console.log("error de rede", error.message)
    })
}

function addBalance(amount, infoDiv) {
    console.log("addBalance", amount);

    const closeBtn = document.getElementById("close-balance-info");
    if (closeBtn) {
        closeBtn.onclick = () => {
            infoDiv.classList.add("hidden");
            infoDiv.innerHTML = "";
        };
    }

    if (!amount || isNaN(amount) || amount <= 0) {
        throw new Error("invalid amount.");
    }

    const data = {
        method: "pix",
        amount: amount,
        account_id:currentUserId,
    }

    opt = {
        method: 'POST',
        headers: {
            'Content-Type':'application/json',
            'access-token' :`Bearer ${access_token}`,
        },
        body: JSON.stringify(data)
    };

    fetch("/api/payments/pix", opt)
    .then(response =>{
        if (response.status==401){
            return refreshTokens(()=>addBalance(amount, infoDiv))
        }

        return response.json()
    })
    .then(data=>{
        if(!data){
            return
        }

        if(data.error){
            infoDiv.innerHTML = `
        <div style="display: flex; flex-direction: column; align-items: center; gap: 15px; padding: 20px; border: 1px solid #ff4d4d; border-radius: 8px; background: #fff5f5;">
            <div style="color: #ff4d4d; font-size: 2rem;">⚠️</div>
            <h3 style="color: #d32f2f; margin: 0;">Erro generate PIX</h3>
            <p style="color: #666; text-align: center; font-size: 0.9rem;">"${data.error}: não foi possível processar o pagamento no momento."</p>
            <button id="close-balance-info" class="nav-btn" style="width: 100%; background: #666; color: white;">Close</button>
        </div>`;

            const closeBtn = document.getElementById("close-balance-info");
            if (closeBtn) {
                closeBtn.onclick = () => {
                    infoDiv.classList.add("hidden");
                    infoDiv.innerHTML = "";
                };
            }   
            return
        }

        const pixPayload = `00020101021126580014br.gov.bcb.pix0136seu-pix-aqui-1234-5678-901234567890520400005303986540${amount}.005802BR5913NOME-RECEBEDOR6008BRASILIA62070503***6304`;
        const qrCodeUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(pixPayload)}`;

        infoDiv.innerHTML = `
            <div style="display: flex; flex-direction: column; align-items: center; gap: 15px; padding: 10px;">
                <h3 class="panel-title">Payment PIX: $${amount}</h3>

                <div style="background: white; padding: 10px; border-radius: 8px;">
                    <img src="${qrCodeUrl}" alt="QR Code PIX" style="width: 150px; height: 150px;">
                </div>
                <div style="width: 100%;">
                    <label style="font-size: 0.8rem; margin-bottom: 5px; display: block;">Código PIX (Copia e Cola):</label>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="pix-copy-paste" value="${pixPayload}" readonly 
                            style="flex: 1; padding: 8px; font-size: 0.7rem; border-radius: 4px; border: 1px solid #ccc;">
                        <button id="btn-copy-pix" class="nav-btn" style="padding: 0 10px; background: var(--success); color: white;">Copiar</button>
                    </div>
                    <small id="copy-status" style="color: var(--success); display: none;">Copied!</small>
                </div>
                <button id="close-balance-info" class="nav-btn" style="width: 100%;">Close</button>
            </div>
        `;
        document.getElementById("btn-copy-pix").onclick = () => {
            const copyText = document.getElementById("pix-copy-paste");
            copyText.select();
            navigator.clipboard.writeText(copyText.value).then(() => {
                const status = document.getElementById("copy-status");
                status.style.display = "block";
                setTimeout(() => status.style.display = "none", 2000);
            });
        };

        const closeBtn = document.getElementById("close-balance-info");
        if (closeBtn) {
            closeBtn.onclick = () => {
                infoDiv.classList.add("hidden");
                infoDiv.innerHTML = "";
            };
        }
    })
    .catch(error =>{
            infoDiv.innerHTML = `
        <div style="display: flex; flex-direction: column; align-items: center; gap: 15px; padding: 20px; border: 1px solid #ff4d4d; border-radius: 8px; background: #fff5f5;">
            <div style="color: #ff4d4d; font-size: 2rem;">⚠️</div>
            <h3 style="color: #d32f2f; margin: 0;">Erro generate PIX</h3>
            <p style="color: #666; text-align: center; font-size: 0.9rem;">"${error} Não foi possível processar o pagamento no momento."</p>
            <button id="close-balance-info" class="nav-btn" style="width: 100%; background: #666; color: white;">Close</button>
        </div>
    `;
        const closeBtn = document.getElementById("close-balance-info");
        if (closeBtn) {
            closeBtn.onclick = () => {
                infoDiv.classList.add("hidden");
                infoDiv.innerHTML = "";
            };
        }
    })
}
